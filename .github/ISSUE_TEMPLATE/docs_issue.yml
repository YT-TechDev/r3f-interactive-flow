name: Documentation issue
description: Report unclear, missing, or incorrect documentation
title: "Docs: "
labels:
  - "type: docs"
body:
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Which document, section, or example is affected?
      placeholder: README, docs/release.md, examples/vite-basic, etc.
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Issue
      description: What is unclear, missing, or incorrect?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: Optional wording or structure suggestion.
    validations:
      required: false
