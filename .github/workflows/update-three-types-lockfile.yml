name: Update three types lockfile

on:
  push:
    branches:
      - fix/vite-basic-three-types

permissions:
  contents: write

jobs:
  update-lockfile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/vite-basic-three-types

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        run: corepack prepare pnpm@11.5.0 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Commit lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          if git diff --cached --quiet; then
            echo "No lockfile changes"
            exit 0
          fi
          git commit -m "fix: add three types to Vite example"
          git push origin HEAD:fix/vite-basic-three-types
